services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voice_back
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voice_back"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      USE_DATABASE: "true"
      TRANSCRIPT_STORAGE: postgresql
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/voice_back
      ASR_BACKEND: local
      WEB_PUBLIC_URL: http://localhost:8080
      # Set in .env: OBJECT_STORAGE_BACKEND=supabase|firebase + credentials
    volumes:
      - ./transcripts:/app/transcripts
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      BACKEND_URL: http://api:8000
      PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  pgadmin_data:
